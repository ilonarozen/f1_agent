<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Drivers</title>
</head>
<body>
    <h1>F1 Drivers 2024</h1>
    <div id="drivers"></div>

    <script>
        fetch("http://127.0.0.1:8000/drivers")
            .then(response => response.json())
            .then(data => {
                let html = "";
                data.forEach(driver => {
                    html += `<p>${driver.full_name} — ${driver.team_name} (${driver.country_code})</p>`;
                });
                document.getElementById("drivers").innerHTML = html;
            })
            .catch(error => {
                document.getElementById("drivers").innerHTML = "Error loading data";
                console.error(error);
            });
    </script>
</body>
</html>
